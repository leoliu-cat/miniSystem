<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" width="800" height="1200">
  <!-- Background -->
  <rect width="800" height="1200" fill="#fdfbf7" />
  
  <!-- Decorative Border -->
  <rect x="40" y="40" width="720" height="1120" fill="none" stroke="#d4af37" stroke-width="4" />
  <rect x="50" y="50" width="700" height="1100" fill="none" stroke="#d4af37" stroke-width="1" />

  <!-- Title -->
  <text x="400" y="200" font-family="serif" font-size="48" fill="#333" text-anchor="middle" letter-spacing="4">WEDDING INVITATION</text>
  <text x="400" y="260" font-family="serif" font-size="24" fill="#666" text-anchor="middle" letter-spacing="8">我們結婚了</text>

  <!-- Names -->
  <text x="400" y="450" font-family="serif" font-size="64" fill="#d4af37" text-anchor="middle">{{groom_name_en}} &amp; {{bride_name_en}}</text>
  <text x="400" y="520" font-family="serif" font-size="36" fill="#333" text-anchor="middle">{{groom_name_zh}} &amp; {{bride_name_zh}}</text>

  <!-- Date & Time -->
  <text x="400" y="700" font-family="sans-serif" font-size="24" fill="#666" text-anchor="middle" letter-spacing="2">{{wedding_date}}</text>
  <text x="400" y="750" font-family="sans-serif" font-size="24" fill="#666" text-anchor="middle" letter-spacing="2">{{wedding_time}}</text>

  <!-- Venue -->
  <text x="400" y="900" font-family="serif" font-size="28" fill="#333" text-anchor="middle">{{venue_name}}</text>
  <text x="400" y="950" font-family="sans-serif" font-size="20" fill="#666" text-anchor="middle">{{venue_address}}</text>

  <!-- Footer -->
  <text x="400" y="1100" font-family="serif" font-size="16" fill="#999" text-anchor="middle" letter-spacing="2">Please join us to celebrate</text>
</svg>
