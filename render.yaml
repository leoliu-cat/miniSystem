services:
  - type: web
    name: ministylecards-quote
    env: node
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /data
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
