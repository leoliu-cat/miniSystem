<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" width="800" height="1200">
  <!-- 背景 -->
  <rect width="800" height="1200" fill="#fdfbf7"/>
  
  <!-- 裝飾邊框 -->
  <rect x="40" y="40" width="720" height="1120" fill="none" stroke="#d4af37" stroke-width="2"/>
  <rect x="50" y="50" width="700" height="1100" fill="none" stroke="#d4af37" stroke-width="1" stroke-dasharray="5,5"/>

  <!-- 標題 -->
  <text x="400" y="200" font-family="serif" font-size="48" fill="#333333" text-anchor="middle" letter-spacing="4">WEDDING INVITATION</text>
  <text x="400" y="250" font-family="sans-serif" font-size="20" fill="#888888" text-anchor="middle" letter-spacing="2">誠摯邀請您來參加我們的婚禮</text>

  <!-- 新人姓名 (注意：text-anchor="middle" 確保文字長度改變時依然置中) -->
  <text x="400" y="450" font-family="sans-serif" font-size="42" fill="#555555" text-anchor="middle">{{groom_name_zh}} &amp; {{bride_name_zh}}</text>
  <text x="400" y="500" font-family="sans-serif" font-size="24" fill="#888888" text-anchor="middle">{{groom_name_en}} &amp; {{bride_name_en}}</text>

  <!-- 裝飾線 -->
  <line x1="300" y1="580" x2="500" y2="580" stroke="#d4af37" stroke-width="1"/>

  <!-- 婚宴日期與時間 -->
  <text x="400" y="660" font-family="sans-serif" font-size="32" fill="#555555" text-anchor="middle">{{wedding_date}}</text>
  <text x="400" y="710" font-family="sans-serif" font-size="24" fill="#888888" text-anchor="middle">{{wedding_time}}</text>

  <!-- 宴客場地 -->
  <text x="400" y="850" font-family="sans-serif" font-size="32" fill="#555555" text-anchor="middle">{{venue_name}}</text>
  <text x="400" y="900" font-family="sans-serif" font-size="20" fill="#888888" text-anchor="middle">{{venue_address}}</text>
</svg>
